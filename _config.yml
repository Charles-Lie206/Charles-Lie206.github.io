# Site Settings
title: Charles's Blog
email: quhaibing206@163.com
description: >- # this means to ignore newlines until "baseurl:"
  Welcome to my personal blog! Sharing my tech notes and life insights here.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://charles-lie206.github.io" # the base hostname & protocol for your site, e.g. http://example.com
twitter_username:
github_username: Charles-Lie206

# Minimal Mistakes Theme Settings
theme: minimal-mistakes-jekyll

# Minimal Mistakes specific settings
minimal_mistakes_skin: "default" # "air", "aqua", "contrast", "dark", "dirt", "neon", "mint", "plum", "sunrise"

# Site Author
author:
  name: Charles
  avatar: /assets/images/bio-photo.svg # Avatar image path, can be replaced later
  bio: "Tech Blog | Recording Learning and Growth"
  location: "China"
  email: quhaibing206@163.com
  links:
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/Charles-Lie206"

# Site Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/Charles-Lie206"

# Reading Files
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - node_modules
  - package.json
  - Rakefile
  - README
  - tmp
  - /docs # ignore Minimal Mistakes /docs
  - /test # ignore Minimal Mistakes /test

# Plugins (previously gems:)
plugins:
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

# mimic GitHub Pages with --safe
whitelist:
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

# Pagination
# paginate: 5 # amount of posts to show
# paginate_path: /page:num/

# Archives
#  Type
#  - GitHub Pages compatible archive pages built with Liquid ~> type: liquid (default)
#  - Jekyll Archives plugin archive pages ~> type: jekyll-archives
#  Path (examples)
#  - Archive page should exist at path when using Liquid method or you can
#    expect broken links (especially with breadcrumbs enabled)
#  - <base_path>/tags/<your-tag>/index.html (path may vary depending on pagination config)
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
# - http://jch.penibelst.de/
compress_html:
  clippings: all
  ignore:
    envs: development

# Defaults
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true

  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
